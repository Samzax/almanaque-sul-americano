<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almanaque Sul-Americano — 38a0 Career</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b14; --bg2:#0c1120; --surf:#121a2e; --surf2:#18223a; --line:#243352;
  --txt:#eaeef8; --mut:#8c97b3; --dim:#5d6b8a;
  --gold:#e9b84a; --gold2:#f6d479; --grn:#19b25e; --grn2:#0f7a41;
  --red:#e8514b; --amber:#f0a04b; --blu:#5aa0f0;
  --acc:var(--grn); --acc2:var(--gold);
  --rad:14px; --shadow:0 18px 50px -20px rgba(0,0,0,.7);
}
body[data-theme="copa"]{ --acc:var(--amber); --acc2:#ffd9a8; }
body[data-theme="liber"]{ --acc:var(--gold); --acc2:var(--gold2); }
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(233,184,74,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(25,178,94,.10), transparent 55%),
    var(--bg);
  color:var(--txt); line-height:1.5; -webkit-font-smoothing:antialiased;
  min-height:100%;
}
.disp{font-family:'Oswald','Archivo Narrow','Arial Narrow',system-ui,sans-serif;text-transform:uppercase;letter-spacing:.04em;line-height:1}
.mono{font-family:'Roboto Mono',ui-monospace,monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#27324f;border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* shell */
#shell{max-width:1180px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
#topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
  padding:12px 20px;background:linear-gradient(180deg,rgba(8,11,20,.96),rgba(8,11,20,.82));
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)
}
.brand{display:flex;align-items:baseline;gap:8px}
.brand b{font-family:'Oswald';font-weight:700;font-size:22px;letter-spacing:.06em;
  background:linear-gradient(180deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.18em}
.tb-spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border:1px solid var(--line);
  border-radius:999px;font-size:12px;color:var(--mut);background:var(--surf)}
.pill b{color:var(--txt);font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc)}

#app{flex:1;padding:22px 20px 60px}
.foot{padding:18px 20px;color:var(--dim);font-size:11px;text-align:center;border-top:1px solid var(--line)}

/* generic */
.card{background:linear-gradient(180deg,var(--surf),var(--surf2));border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow)}
.pad{padding:20px}
h2.sec{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);margin-bottom:14px;display:flex;align-items:center;gap:10px}
h2.sec::before{content:"";width:22px;height:2px;background:var(--acc)}
.title-xl{font-family:'Oswald';font-weight:700;font-size:clamp(30px,6vw,56px);text-transform:uppercase;letter-spacing:.01em;line-height:.95}
.lead{color:var(--mut);max-width:62ch}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.grid{display:grid;gap:14px}
.muted{color:var(--mut)}
.gold{color:var(--gold)}
.center{text-align:center}
.tag{display:inline-block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);padding:3px 8px;border-radius:6px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:11px;
  font-weight:600;font-size:14px;border:1px solid transparent;transition:.15s transform,.15s filter}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(180deg,var(--acc),color-mix(in srgb,var(--acc) 70%,#000));color:#06210f;box-shadow:0 10px 26px -12px var(--acc)}
body[data-theme="liber"] .btn-primary,body[data-theme="copa"] .btn-primary{color:#241500}
.btn-primary:hover{filter:brightness(1.08)}
.btn-ghost{background:var(--surf);border-color:var(--line);color:var(--txt)}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc2)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:9px}
.btn[disabled]{opacity:.4;cursor:not-allowed}

input,select{font-family:inherit;background:var(--bg2);border:1px solid var(--line);color:var(--txt);
  border-radius:9px;padding:10px 12px;font-size:14px;outline:none}
input:focus,select:focus{border-color:var(--acc)}
label.fld{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}

/* player card (signature element) */
.pcard{position:relative;width:100%;border-radius:13px;padding:12px 12px 10px;cursor:pointer;
  background:linear-gradient(160deg,#1b2742,#101a30);border:1px solid var(--line);overflow:hidden;transition:.15s}
.pcard::before{content:"";position:absolute;inset:0;background:radial-gradient(120px 80px at 80% 0%,rgba(233,184,74,.14),transparent 70%);pointer-events:none}
.pcard:hover{transform:translateY(-3px);border-color:var(--acc)}
.pcard.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(233,184,74,.35)}
.pcard.t-elite{background:linear-gradient(160deg,#3a2f10,#171205);border-color:#6e561c}
.pcard.t-gold{background:linear-gradient(160deg,#2a2208,#14110a)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pc-rate{font-family:'Oswald';font-weight:700;font-size:30px;line-height:.8;color:var(--gold2)}
.pc-pos{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--mut);margin-top:2px}
.pc-name{font-family:'Oswald';font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.02em;margin-top:14px;line-height:1.02}
.pc-club{font-size:11px;color:var(--mut);margin-top:3px;display:flex;justify-content:space-between;gap:6px}
.posbadge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;letter-spacing:.06em}
.p-GK{background:#3a2a12;color:#f0c574}.p-DF{background:#123a2a;color:#7fe3b0}
.p-MF{background:#11294a;color:#8cc0ff}.p-FW{background:#3a1220;color:#ff9bb0}

/* tables */
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:var(--mut);text-align:right;padding:9px 8px;border-bottom:1px solid var(--line)}
table.tbl th:first-child,table.tbl td:first-child{text-align:left}
table.tbl td{padding:9px 8px;border-bottom:1px solid rgba(36,51,82,.5);text-align:right}
table.tbl tr.me td{background:rgba(25,178,94,.10)}
table.tbl tr.me td:first-child{box-shadow:inset 3px 0 0 var(--acc)}
table.tbl .zone-lib td:first-child{box-shadow:inset 3px 0 0 var(--gold)}
table.tbl .zone-rel td:first-child{box-shadow:inset 3px 0 0 var(--red)}
.tname{display:flex;align-items:center;gap:9px}
.crest{width:22px;height:22px;border-radius:6px;flex:none;display:grid;place-items:center;font-family:'Oswald';font-weight:700;font-size:11px;color:#000}
.pos-no{display:inline-block;width:20px;text-align:right;color:var(--mut);font-weight:600}

/* match day */
.md-grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:820px){.md-grid{grid-template-columns:320px 1fr}}
.opt-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:var(--bg2);color:var(--mut);transition:.12s}
.chip:hover{color:var(--txt)}
.chip.on{background:color-mix(in srgb,var(--acc) 22%,var(--bg2));border-color:var(--acc);color:var(--acc2);font-weight:600}
.pitch{position:relative;border-radius:14px;min-height:430px;
  background:
    repeating-linear-gradient(180deg,#0e3a23 0 36px,#0c3420 36px 72px);
  border:1px solid #1c5a39;overflow:hidden}
.pitch::after{content:"";position:absolute;inset:14px;border:2px solid rgba(255,255,255,.12);border-radius:8px;pointer-events:none}
.pitch .mid{position:absolute;left:14px;right:14px;top:50%;height:2px;background:rgba(255,255,255,.12)}
.pitch .circ{position:absolute;left:50%;top:50%;width:90px;height:90px;border:2px solid rgba(255,255,255,.12);border-radius:50%;transform:translate(-50%,-50%)}
.slot{position:absolute;transform:translate(-50%,-50%);width:64px;text-align:center;cursor:pointer}
.slot .jersey{width:42px;height:42px;border-radius:50%;margin:0 auto;display:grid;place-items:center;
  font-family:'Oswald';font-weight:700;font-size:15px;color:#06210f;background:linear-gradient(180deg,#f4f7ff,#cdd6e6);border:2px solid rgba(255,255,255,.5);box-shadow:0 6px 14px rgba(0,0,0,.4)}
.slot.empty .jersey{background:rgba(255,255,255,.08);color:var(--mut);border-style:dashed}
.slot .nm{font-size:10px;margin-top:4px;color:#eafff2;text-shadow:0 1px 3px #000;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot .rt{position:absolute;top:-4px;right:6px;font-family:'Oswald';font-weight:700;font-size:11px;color:var(--gold2);background:#0008;border-radius:5px;padding:0 4px}

.bench{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.bp{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;background:var(--bg2);font-size:12px;cursor:pointer}
.bp:hover{border-color:var(--acc)}
.bp .r{margin-left:auto;font-family:'Oswald';font-weight:700;color:var(--gold2)}
.bp.dis{opacity:.45;cursor:default}

/* fixtures / results */
.fx{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid rgba(36,51,82,.5);font-size:13px}
.fx .sc{font-family:'Oswald';font-weight:700;min-width:46px;text-align:center;font-size:15px}
.fx .h{flex:1;text-align:right}.fx .a{flex:1}
.fx.win .sc{color:var(--grn)} .fx.los .sc{color:var(--red)} .fx.drw .sc{color:var(--mut)}
.fx.big{padding:14px}

/* bracket */
.bracket{display:flex;gap:26px;overflow-x:auto;padding:8px 2px 16px}
.brd-round{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:180px}
.tie{border:1px solid var(--line);border-radius:10px;background:var(--bg2);overflow:hidden;font-size:12px}
.tie .t{display:flex;justify-content:space-between;padding:7px 10px}
.tie .t+ .t{border-top:1px solid var(--line)}
.tie .t.w{color:var(--gold2);font-weight:600}
.tie .t.w .sc{color:var(--gold2)}
.tie .sc{font-family:'Oswald';font-weight:700}
.tie.me{box-shadow:0 0 0 2px rgba(25,178,94,.4)}

/* groups */
.groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}

/* toast */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--surf2);border:1px solid var(--acc);color:var(--txt);padding:12px 18px;border-radius:11px;
  font-size:14px;z-index:80;transition:.25s;box-shadow:var(--shadow);max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* modal */
#modal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:18px;
  background:rgba(4,6,12,.7);backdrop-filter:blur(4px)}
#modal.show{display:flex}
.modal-box{max-width:560px;width:100%;max-height:86vh;overflow:auto}

.stat{display:flex;flex-direction:column;gap:2px}
.stat b{font-family:'Oswald';font-weight:700;font-size:26px;color:var(--acc2)}
.stat span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em}

.trophy{font-size:13px;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:9px;background:linear-gradient(90deg,rgba(233,184,74,.12),transparent);border:1px solid #5a4a1d}
.hr{height:1px;background:var(--line);margin:16px 0}
.kicker{font-family:'Oswald';font-weight:600;letter-spacing:.2em;font-size:12px;color:var(--acc2);text-transform:uppercase}
.split{display:grid;gap:18px}
@media(min-width:860px){.split.two{grid-template-columns:1fr 1fr}}
.scroll-x{overflow-x:auto}
.barwrap{height:7px;background:#0c1426;border-radius:6px;overflow:hidden}
.barwrap>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-top:10px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.sw{width:10px;height:10px;border-radius:3px}
</style>
</head>

function poisson(l){if(l<=0)return 0;let L=Math.exp(-l),k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}

// vetor a partir do XI de um humano + táticas
function humanVector(team){
  const xi=team.xi.map(uid=>team.squad.find(p=>p.uid===uid)).filter(Boolean);
  const form=FORMATIONS[team.tac.form]||FORMATIONS["4-4-2"];
  // separa por linha conforme formação alvo (jogador fora de posição perde rendimento)
  let gkR=70, defs=[], mids=[], atts=[];
  const byPos={GK:[],DF:[],MF:[],FW:[]};
  xi.forEach(p=>byPos[p.p].push(p));
  if(byPos.GK[0])gkR=byPos.GK[0].r; else if(xi[0])gkR=xi[0].r-12;
  const pool=xi.filter(p=>!(byPos.GK[0]&&p.uid===byPos.GK[0].uid));
  const chosen=new Set();
  function fillLine(pos,n){const out=[];const exact=pool.filter(p=>p.p===pos&&!chosen.has(p.uid)).sort((a,b)=>b.r-a.r);for(const p of exact){if(out.length<n){out.push(p.r);chosen.add(p.uid);}}while(out.length<n){const other=pool.filter(p=>!chosen.has(p.uid)).sort((a,b)=>b.r-a.r)[0];if(!other)break;out.push(other.r-8);chosen.add(other.uid);}return out;}
  defs=fillLine("DF",form.DF); mids=fillLine("MF",form.MF); atts=fillLine("FW",form.FW);
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:65;
  let def=(gkR*0.85+avg(defs)*form.DF)/(0.85+form.DF);
  let mid=avg(mids), att=avg(atts);
  // bônus de profundidade do banco
  const benchAvg=avg(team.squad.filter(p=>!team.xi.includes(p.uid)).map(p=>p.r));
  const depth=(benchAvg-70)*0.05; def+=depth;mid+=depth;att+=depth;
  // aplica táticas
  const T=TACTICS[team.tac.tactic]||TACTICS["Tiki-taka"], S=STYLES[team.tac.style]||STYLES["Equilibrado"], P=PRESSURE[team.tac.press]||PRESSURE["Média"];
  att+=T.a+S.a+P.a; mid+=T.m; def+=T.d+S.d+P.d;
  const risk=(T.risk||0)+(S.risk||0)+(P.risk||0);
  // sinergia tiki-taka exige bom meio
  if(team.tac.tactic==="Tiki-taka"&&mid<80){att-=3;mid-=2;}
  return {name:team.name,att:clamp(att,40,99),mid:clamp(mid,40,99),def:clamp(def,40,99),risk};
}
function aiVector(team){
  const r=team.rating; const j=rint(-3,3);
  return {name:team.name,att:clamp(r+j,40,99),mid:clamp(r+rint(-3,3),40,99),def:clamp(r+rint(-3,3),40,99),risk:rint(-1,1)};
}
function vectorOf(team){return team.kind==="human"?humanVector(team):aiVector(team);}

function playMatch(teamA,teamB,homeA){
  const A=vectorOf(teamA), B=vectorOf(teamB);
  const midEdge=(A.mid-B.mid)/45;
  const open=0.16*((A.risk||0)+(B.risk||0));
  let xgA=1.28+(A.att-B.def)/13+midEdge+open;
  let xgB=1.28+(B.att-A.def)/13-midEdge+open;
  if(homeA===true){xgA+=0.28;xgB-=0.10;} else if(homeA===false){xgB+=0.28;xgA-=0.10;}
  xgA=clamp(xgA,0.12,4.8);xgB=clamp(xgB,0.12,4.8);
  let gA=poisson(xgA), gB=poisson(xgB);
  return {gA,gB,xgA:+xgA.toFixed(2),xgB:+xgB.toFixed(2)};
}

const G = { phase:"setup", season:1, numSeasons:3, humans:[], nextLiberBrazil:null, seasonLog:[], hist:[] };

function makeHuman(i,name){return {
  kind:"human", id:i, name:name||("Jogador "+(i+1)), color:PLAYER_COLORS[i%PLAYER_COLORS.length],
  squad:[], xi:[], tac:{form:"4-4-2",tactic:"Tiki-taka",style:"Equilibrado",press:"Média"},
  titles:{br:0,copa:0,liber:0}, defLiber:false, defCopa:false, absent:false, _relegate:false,
  W:0,D:0,L:0,GF:0,GA:0,Pts:0,played:0 };}
function makeAI(name,rating){return {kind:"ai",name,rating,color:crestColor(name),W:0,D:0,L:0,GF:0,GA:0,Pts:0,played:0};}
function resetStats(t){t.W=t.D=t.L=t.GF=t.GA=t.Pts=t.played=0;}

/* fixtures (método do círculo) */
function roundRobin(n){const idx=[...Array(n).keys()];if(n%2)idx.push(-1);const m=idx.length,half=m/2,rounds=[];let arr=idx.slice();
  for(let r=0;r<m-1;r++){const pairs=[];for(let i=0;i<half;i++){const a=arr[i],b=arr[m-1-i];if(a!==-1&&b!==-1){((r+i)%2===0)?pairs.push([a,b]):pairs.push([b,a]);}}rounds.push(pairs);arr=[arr[0],arr[m-1],...arr.slice(1,m-1)];}
  return rounds;}
function doubleRR(n){const r1=roundRobin(n);return r1.concat(r1.map(rd=>rd.map(([h,a])=>[a,h])));}

/* resultados */
function applyStats(H,A,gA,gB){H.played++;A.played++;H.GF+=gA;H.GA+=gB;A.GF+=gB;A.GA+=gA;
  if(gA>gB){H.W++;A.L++;H.Pts+=3;}else if(gA<gB){A.W++;H.L++;A.Pts+=3;}else{H.D++;A.D++;H.Pts++;A.Pts++;}}
function standings(teams){return teams.slice().sort((a,b)=>b.Pts-a.Pts||(b.GF-b.GA)-(a.GF-a.GA)||b.GF-a.GF||b.W-a.W);}

/* shootout */
function shootoutScore(A,B){const av=vectorOf(A),bv=vectorOf(B);const pa=(av.att+av.def)/2,pb=(bv.att+bv.def)/2;let a=0,b=0;
  for(let i=0;i<5;i++){if(Math.random()<clamp(pa/(pa+pb)*0.8+0.12,0.2,0.92))a++;if(Math.random()<clamp(pb/(pa+pb)*0.8+0.12,0.2,0.92))b++;}
  let guard=0;while(a===b&&guard++<20){if(Math.random()<pa/(pa+pb))a++;else b++;}
  return {a,b,win:a>b?"A":"B"};}
function resolveKO(A,B){const m=playMatch(A,B,null);if(m.gA===m.gB){const p=shootoutScore(A,B);return {A,B,gA:m.gA,gB:m.gB,pa:p.a,pb:p.b,pens:true,win:p.win==="A"?A:B};}return {A,B,gA:m.gA,gB:m.gB,pens:false,win:m.gA>m.gB?A:B};}

/* ---------- LIGA (Brasileirão) ---------- */
function buildLeague(){
  const active=G.humans.filter(h=>!h.absent);
  active.forEach(resetStats);
  const teams=active.slice();
  const need=20-teams.length;
  const names=shuffle(BR_FILLER).slice(0,need);
  for(let k=0;k<need;k++){const rating=Math.round(88-k*(15/Math.max(1,need))+rint(-2,2));teams.push(makeAI(names[k]||("Clube "+k),clamp(rating,72,90)));}
  const field=shuffle(teams).slice(0,20);
  G.league={teams:field,fixtures:doubleRR(20),round:0,results:[],midDone:false,finished:false,humanQ:[],qi:0};
  leagueBuildQueue();
}
function leagueBuildQueue(){const L=G.league;if(L.round>=L.fixtures.length){L.humanQ=[];return;}
  const rd=L.fixtures[L.round];const q=[];
  rd.forEach(([hi,ai])=>{const H=L.teams[hi],A=L.teams[ai];
    if(H.kind==="human")q.push({hi,ai,side:"H",team:H,opp:A,home:true});
    if(A.kind==="human")q.push({hi,ai,side:"A",team:A,opp:H,home:false});});
  L.humanQ=q;L.qi=0;}
function leagueSimulateRound(){const L=G.league;const rd=L.fixtures[L.round];const res=[];
  rd.forEach(([hi,ai])=>{const H=L.teams[hi],A=L.teams[ai];const m=playMatch(H,A,true);applyStats(H,A,m.gA,m.gB);res.push({hi,ai,gA:m.gA,gB:m.gB,H:H.name,A:A.name});});
  L.results[L.round]=res;L.round++;return res;}

  const field=shuffle(teams).slice(0,64);
  G.copa={field,roundIdx:0,ties:makeTies(field),champion:null,log:[],humanQ:[],qi:0};
  koBuildQueue(G.copa);
}
function makeTies(arr){const t=[];for(let i=0;i<arr.length;i+=2)t.push({A:arr[i],B:arr[i+1],done:false,res:null});return t;}
function koBuildQueue(C){const q=[];C.ties.forEach((tie,idx)=>{
    if(tie.A.kind==="human")q.push({idx,team:tie.A,opp:tie.B});
    if(tie.B.kind==="human")q.push({idx,team:tie.B,opp:tie.A});});
  C.humanQ=q;C.qi=0;}
function copaResolveRound(){const C=G.copa;const winners=[];
  C.ties.forEach(tie=>{const r=resolveKO(tie.A,tie.B);tie.res=r;tie.done=true;winners.push(r.win);});
  C.log.push({name:COPA_NAMES[C.roundIdx]||("Fase "+C.roundIdx),ties:C.ties.slice()});
  if(winners.length===1){C.champion=winners[0];if(C.champion.kind==="human")C.champion.titles.copa++;return true;}
  C.roundIdx++;C.ties=makeTies(winners);koBuildQueue(C);return false;}

/* ---------- LIBERTADORES (32: grupos + mata-mata) ---------- */
function resetGroup(t){t.gP=t.gW=t.gD=t.gL=t.gGF=t.gGA=t.gPts=0;}
function descTeam(t){return t.kind==="human"?{human:t.id,name:t.name}:{name:t.name,rating:t.rating};}
function descIsTeam(d,t){return d.human!=null?(t.kind==="human"&&t.id===d.human):(t.kind!=="human"&&t.name===d.name);}
function buildLiber(){
  const teams=[];
  (G.nextLiberBrazil||[]).forEach(d=>{ if(d.human!=null){const h=G.humans[d.human];if(h)teams.push(h);} else teams.push(makeAI(d.name,d.rating)); });
  const used=new Set(teams.map(t=>t.name));
  const pool=shuffle(LIBER_POOL.filter(p=>!used.has(p[0])));
  let i=0;while(teams.length<32&&i<pool.length){const p=pool[i++];teams.push(makeAI(p[0],p[2]));used.add(p[0]);}
  while(teams.length<32)teams.push(makeAI("Dep. "+genName().split(" ")[1],rint(76,82)));
  teams.forEach(t=>{if(t.kind==="ai")resetStats(t);resetGroup(t);});
  const field=shuffle(teams).slice(0,32);
  const groups=[];for(let g=0;g<8;g++)groups.push(field.slice(g*4,g*4+4));
  G.liber={field,groups,gFix:groups.map(()=>doubleRR(4)),gRound:0,stage:"groups",ko:null,koIdx:0,champion:null,humanQ:[],qi:0,log:[]};
  liberAutoNonHumanGroups();
  liberBuildGroupQueue();
}
// pré-simula todos os jogos de grupos que NÃO envolvem humano; deixa os do humano p/ jogar
function liberAutoNonHumanGroups(){
  const Lb=G.liber;
  Lb.groups.forEach((grp,gi)=>{ const fix=Lb.gFix[gi];
    fix.forEach(rd=>rd.forEach(([hi,ai])=>{const H=grp[hi],A=grp[ai];
      if(H.kind!=="human"&&A.kind!=="human"){const m=playMatch(H,A,true);applyGroup(H,A,m.gA,m.gB);} }));
  });
}
function applyGroup(H,A,gA,gB){H.gP++;A.gP++;H.gGF+=gA;H.gGA+=gB;A.gGF+=gB;A.gGA+=gA;
  if(gA>gB){H.gW++;A.gL++;H.gPts+=3;}else if(gA<gB){A.gW++;H.gL++;A.gPts+=3;}else{H.gD++;A.gD++;H.gPts++;A.gPts++;}}
function liberBuildGroupQueue(){
  const Lb=G.liber;const q=[];Lb.playedFix=new Set();
  Lb.groups.forEach((grp,gi)=>{const fix=Lb.gFix[gi];
    fix.forEach((rd,rdi)=>rd.forEach(([hi,ai],pi)=>{const H=grp[hi],A=grp[ai];const fixId="g"+gi+"-"+rdi+"-"+pi;
      if(H.kind==="human")q.push({gi,team:H,opp:A,home:true,fixId});
      if(A.kind==="human")q.push({gi,team:A,opp:H,home:false,fixId});}));});
  Lb.humanQ=q;Lb.qi=0;
}
function groupStandings(grp){return grp.slice().sort((a,b)=>b.gPts-a.gPts||(b.gGF-b.gGA)-(a.gGF-a.gGA)||b.gGF-a.gGF);}
function liberStartKO(){
  const Lb=G.liber;const qual=[];
  Lb.groups.forEach(grp=>{const s=groupStandings(grp);qual.push(s[0],s[1]);});
  // semeia: 1ºs x 2ºs alternados
  const firsts=[],seconds=[];Lb.groups.forEach(grp=>{const s=groupStandings(grp);firsts.push(s[0]);seconds.push(s[1]);});
  const ko=[];const sh=shuffle(seconds);for(let i=0;i<8;i++)ko.push({A:firsts[i],B:sh[i],done:false,res:null});
  Lb.stage="ko";Lb.ties=ko;Lb.koIdx=0;Lb.koNames=["Oitavas de final","Quartas de final","Semifinal","Final"];
  koBuildQueue(Lb);
}
function liberResolveKORound(){
  const Lb=G.liber;const winners=[];
  Lb.ties.forEach(tie=>{const r=resolveKO(tie.A,tie.B);tie.res=r;tie.done=true;winners.push(r.win);});
  Lb.log.push({name:Lb.koNames[Lb.koIdx]||("Fase "+Lb.koIdx),ties:Lb.ties.slice()});
  if(winners.length===1){Lb.champion=winners[0];if(Lb.champion.kind==="human")Lb.champion.titles.liber++;return true;}
  Lb.koIdx++;Lb.ties=makeTies(winners);koBuildQueue(Lb);return false;
}

/* ---------- FIM DE TEMPORADA: rebaixamento, classificação p/ Libertadores ---------- */
function computeSeasonEnd(){
  const L=G.league,table=standings(L.teams),champ=table[0];
  if(champ.kind==="human")champ.titles.br++;
  const releg=table.slice(-4);releg.forEach(t=>{if(t.kind==="human")t._relegate=true;});
  // limpa flags de defesa antigos
  G.humans.forEach(h=>{h.defLiber=false;h.defCopa=false;});
  // campo brasileiro p/ Libertadores do PRÓXIMO ano (regra real + cascata)
  const desc=[];const top6=table.slice(0,6);
  top6.forEach(t=>desc.push(descTeam(t)));
  if(G.copa&&G.copa.champion){const cc=G.copa.champion;
    const inTop6=top6.some(t=>t===cc||(t.kind==="human"&&cc.kind==="human"&&t.id===cc.id)||(t.kind!=="human"&&cc.kind!=="human"&&t.name===cc.name));
    if(!inTop6)desc.push(descTeam(cc));
    else if(table[6])desc.push(descTeam(table[6]));// vaga desce p/ 7º
    if(cc.kind==="human")cc.defCopa=true;}
  if(G.liber&&G.liber.champion){const lc=G.liber.champion;
    if(!desc.some(d=>descIsTeam(d,lc)))desc.push(descTeam(lc));
    if(lc.kind==="human")lc.defLiber=true;}
  G.nextLiberBrazil=desc;
  // log
  G.seasonLog.push({
    season:G.season,
    champion:champ.name, championHuman:champ.kind==="human",
    table:table.map((t,i)=>({pos:i+1,name:t.name,human:t.kind==="human",Pts:t.Pts,GD:t.GF-t.GA})),
    releg:releg.map(t=>t.name),
    copa:G.copa?G.copa.champion.name:null, copaHuman:G.copa?G.copa.champion.kind==="human":false,
    liber:G.liber?G.liber.champion.name:null, liberHuman:G.liber?G.liber.champion.kind==="human":false
  });
}

function autoXI(team){
  const f=FORMATIONS[team.tac.form]||FORMATIONS["4-4-2"];const sq=team.squad.slice();const used=new Set();const xi=[];
  const gk=sq.filter(p=>p.p==="GK").sort((a,b)=>b.r-a.r)[0]||sq.slice().sort((a,b)=>b.r-a.r)[0];
  if(gk){xi.push(gk.uid);used.add(gk.uid);}
  ["DF","MF","FW"].forEach(pos=>{const n=f[pos];const arr=sq.filter(p=>p.p===pos&&!used.has(p.uid)).sort((a,b)=>b.r-a.r);for(let k=0;k<n&&k<arr.length;k++){xi.push(arr[k].uid);used.add(arr[k].uid);}});
  while(xi.length<11){const p=sq.filter(x=>!used.has(x.uid)).sort((a,b)=>b.r-a.r)[0];if(!p)break;xi.push(p.uid);used.add(p.uid);}
  team.xi=xi.slice(0,11);
}
function slotCoords(form){const f=FORMATIONS[form]||FORMATIONS["4-4-2"];const out=[{x:50,y:87,pos:"GK"}];
  const lx=c=>{if(c<=0)return[];if(c===1)return[50];const o=[];for(let i=0;i<c;i++)o.push(15+70*i/(c-1));return o;};
  lx(f.DF).forEach(x=>out.push({x,y:67,pos:"DF"}));lx(f.MF).forEach(x=>out.push({x,y:45,pos:"MF"}));lx(f.FW).forEach(x=>out.push({x,y:24,pos:"FW"}));
  return out;}
function assignSlot(team,i,uid){const j=team.xi.indexOf(uid);if(j===i)return;if(j>=0){const t=team.xi[i];team.xi[i]=uid;team.xi[j]=t;}else{team.xi[i]=uid;}}
function P(team,uid){return team.squad.find(p=>p.uid===uid);}

function handleAction(a,ds){
  const team=currentTeam();
  switch(a){
    case "setup-start":{const n=G.setupCount||1;const humans=[];for(let i=0;i<n;i++){const inp=document.getElementById("nm"+i);humans.push(makeHuman(i,(inp&&inp.value.trim())||("Jogador "+(i+1))));}
      G.humans=humans;G.draft={order:[],idx:0};for(let r=0;r<17;r++){const seq=[...humans.keys()];(r%2?seq.reverse():seq).forEach(i=>G.draft.order.push(i));}drawClub();G.phase="draft";render();break;}
    case "dp-pick":{const off=G.draft.club.players[+ds.i];signPlayer(G.humans[G.draft.order[G.draft.idx]],off,G.draft.club.club);advanceDraft();break;}
    case "dp-pickbest":{const arr=G.draft.club.players.map((p,i)=>[p,i]).sort((x,y)=>y[0][2]-x[0][2]);signPlayer(G.humans[G.draft.order[G.draft.idx]],arr[0][0],G.draft.club.club);advanceDraft();break;}
    case "dp-autoall":{let guard=0;while(G.draft.idx<G.draft.order.length&&guard++<2000){drawClub();const best=G.draft.club.players.slice().sort((x,y)=>y[2]-x[2])[0];signPlayer(G.humans[G.draft.order[G.draft.idx]],best,G.draft.club.club);G.draft.idx++;}finishDraft();break;}
    case "begin-league":{G.phase="league";leagueBuildQueue();G.league.qi=0;render();break;}
    case "set":{if(team){team.tac[ds.k]=ds.v;if(ds.k==="form")autoXI(team);render();}break;}
    case "autoxi":{if(team){autoXI(team);render();}break;}
    case "slot":{if(team)openSlotChooser(team,+ds.i);break;}
    case "assign":{if(team){assignSlot(team,+ds.i,+ds.uid);closeModal();render();}break;}
    case "modal-close":closeModal();break;
    /* liga */
    case "lg-play":{const L=G.league;if(L.humanQ.length===0){leagueSimAndAdvance();break;}L.qi++;if(L.qi<L.humanQ.length)render();else leagueSimAndAdvance();break;}
    case "lg-auto":leagueSimAndAdvance();break;
    case "lg-simall":{const L=G.league;let g=0;while(!L.finished&&g++<80){leagueSimulateRound();L.lastRes={round:L.round,res:L.results[L.round-1]};if(L.round>=38){L.finished=true;afterLeague();return;}if(L.round===19&&!L.midDone){L.midDone=true;if(G.humans.some(h=>!h.absent)){openWindow("league");return;}}}render();break;}
    /* janela */
    case "open-window-end":openWindow("seasonEnd");break;
    case "win-tab":G.window.tab=+ds.i;G.window.release=null;G.window.club=null;render();break;
    case "win-release":G.window.release=+ds.uid;G.window.club=drawSwapClub();render();break;
    case "win-redraw":G.window.club=drawSwapClub();render();break;
    case "win-sign":{const w=G.window,h=G.humans[w.tab];if(w.swaps[h.id]<=0){toast("Sem trocas restantes");break;}const off=w.club.players[+ds.i];const idx=h.squad.findIndex(p=>p.uid===w.release);if(idx>=0)h.squad.splice(idx,1);h.squad.push({uid:uid(),n:off[0],p:off[1],r:off[2],from:w.club.club.n+(w.club.club.e?" "+w.club.club.e:"")});w.swaps[h.id]--;w.release=null;w.club=null;autoXI(h);toast("Reforço contratado!");render();break;}
    case "win-close":closeWindow();break;
    /* copa */
    case "cp-play":{const C=G.copa;if(C.humanQ.length>0&&C.qi<C.humanQ.length){C.qi++;if(C.qi<C.humanQ.length){render();break;}copaResolveRound();}else{copaResolveRound();}let g=0;while(!C.champion&&C.humanQ.length===0&&g++<10){copaResolveRound();}render();break;}
    case "cp-continue":afterCopa();break;
    /* libertadores */
    case "lb-grp-play":{const Lb=G.liber;if(Lb.humanQ.length>0&&Lb.qi<Lb.humanQ.length){playHumanGroupMatch(Lb.humanQ[Lb.qi]);Lb.qi++;if(Lb.qi<Lb.humanQ.length){render();break;}}liberStartKO();render();break;}
    case "lk-play":{const Lb=G.liber;if(Lb.humanQ.length>0&&Lb.qi<Lb.humanQ.length){Lb.qi++;if(Lb.qi<Lb.humanQ.length){render();break;}liberResolveKORound();}else{liberResolveKORound();}let g=0;while(!Lb.champion&&Lb.humanQ.length===0&&g++<10){liberResolveKORound();}render();break;}
    case "lb-continue":afterLiber();break;
    /* temporada */
    case "advance-season":advanceSeason();break;
    case "restart":restart();break;
  }
}
function signPlayer(h,off,club){h.squad.push({uid:uid(),n:off[0],p:off[1],r:off[2],from:club.n+(club.e?" "+club.e:"")});}
function advanceDraft(){G.draft.idx++;if(G.draft.idx>=G.draft.order.length){finishDraft();}else{drawClub();render();}}
function drawClub(){const h=G.humans[G.draft.order[G.draft.idx]];const cnt={GK:0,DF:0,MF:0,FW:0};h.squad.forEach(p=>cnt[p.p]++);
  const need={GK:2,DF:5,MF:5,FW:3};const deficit={};let sum=0;["GK","DF","MF","FW"].forEach(k=>{deficit[k]=Math.max(0,need[k]-cnt[k]);sum+=deficit[k];});
  const picksLeft=17-h.squad.length;const constrained=picksLeft<=sum;const defPos=new Set(Object.keys(deficit).filter(k=>deficit[k]>0));
  const taken=new Set();G.humans.forEach(hh=>hh.squad.forEach(p=>taken.add(p.from+"|"+p.n)));
  const offerFrom=club=>{const label=club.n+(club.e?" "+club.e:"");return club.p.filter(pl=>(!constrained||defPos.has(pl[1]))&&!taken.has(label+"|"+pl[0]));};
  let club=pick(BR_CLUBS),players=offerFrom(club),t=0;
  while(players.length===0&&t++<14){club=pick(BR_CLUBS);players=offerFrom(club);}
  if(players.length===0){const poss=constrained?[...defPos]:["GK","DF","MF","FW"];club={n:"Agentes livres",e:"",c:"BRA",p:poss.map(p=>["Reforço "+pick(LN),p,rint(74,82)])};players=club.p;}
  G.draft.club={club,players,constrained,cnt,need};}
function finishDraft(){G.humans.forEach(h=>autoXI(h));beginSeasonSetup();}
function playHumanGroupMatch(cur){if(G.liber.playedFix.has(cur.fixId))return;const m=playMatch(cur.team,cur.opp,cur.home);if(cur.home)applyGroup(cur.team,cur.opp,m.gA,m.gB);else applyGroup(cur.opp,cur.team,m.gB,m.gA);G.liber.playedFix.add(cur.fixId);}
function restart(){_uid=1;G.phase="setup";G.season=1;G.humans=[];G.nextLiberBrazil=null;G.seasonLog=[];G.league=G.copa=G.liber=null;G.setupCount=1;render();}

/* eventos */
document.addEventListener("click",e=>{const b=e.target.closest("[data-action]");if(!b)return;e.preventDefault();handleAction(b.dataset.action,b.dataset);});
document.addEventListener("change",e=>{if(e.target.id==="setupCount"){const n=+e.target.value;const names=[];for(let i=0;i<(G.setupCount||1);i++){const inp=document.getElementById("nm"+i);if(inp)names.push(inp.value);}G.setupCount=n;render();for(let i=0;i<names.length&&i<n;i++){const inp=document.getElementById("nm"+i);if(inp&&names[i])inp.value=names[i];}}});

/* boot */
G.setupCount=1;render();
</script>
